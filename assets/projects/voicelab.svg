<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08080d"/>
      <stop offset="100%" stop-color="#141428"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
  <!-- background -->
  <rect width="400" height="240" fill="url(#bg)"/>
  <!-- ambient glow blobs -->
  <ellipse cx="200" cy="60" rx="120" ry="50" fill="#6366f1" opacity="0.12" filter="url(#blur)"/>
  <ellipse cx="300" cy="180" rx="80" ry="40" fill="#22d3ee" opacity="0.07" filter="url(#blur)"/>
  <!-- waveform bars -->
  <g opacity="0.6">
    <rect x="30" y="108" width="6" height="24" rx="3" fill="url(#glow)"/>
    <rect x="42" y="96" width="6" height="48" rx="3" fill="url(#glow)"/>
    <rect x="54" y="88" width="6" height="64" rx="3" fill="url(#glow)"/>
    <rect x="66" y="100" width="6" height="40" rx="3" fill="url(#glow)"/>
    <rect x="78" y="110" width="6" height="20" rx="3" fill="url(#glow)"/>
    <rect x="90" y="104" width="6" height="32" rx="3" fill="url(#glow)"/>
    <rect x="102" y="92" width="6" height="56" rx="3" fill="url(#glow)"/>
    <rect x="114" y="106" width="6" height="28" rx="3" fill="url(#glow)"/>
    <rect x="126" y="114" width="6" height="12" rx="3" fill="url(#glow)"/>
    <!-- right side mirror -->
    <rect x="264" y="108" width="6" height="24" rx="3" fill="url(#glow)"/>
    <rect x="276" y="96" width="6" height="48" rx="3" fill="url(#glow)"/>
    <rect x="288" y="84" width="6" height="72" rx="3" fill="url(#glow)"/>
    <rect x="300" y="98" width="6" height="44" rx="3" fill="url(#glow)"/>
    <rect x="312" y="106" width="6" height="28" rx="3" fill="url(#glow)"/>
    <rect x="324" y="112" width="6" height="16" rx="3" fill="url(#glow)"/>
    <rect x="336" y="102" width="6" height="36" rx="3" fill="url(#glow)"/>
    <rect x="348" y="108" width="6" height="24" rx="3" fill="url(#glow)"/>
    <rect x="360" y="114" width="6" height="12" rx="3" fill="url(#glow)"/>
  </g>
  <!-- microphone icon (centre) -->
  <g transform="translate(200,120)">
    <!-- mic body -->
    <rect x="-14" y="-36" width="28" height="44" rx="14" fill="url(#glow)" opacity="0.9"/>
    <!-- mic stand arm -->
    <path d="M -22 6 Q -22 34 0 34 Q 22 34 22 6" fill="none" stroke="url(#glow)" stroke-width="3" stroke-linecap="round"/>
    <!-- stand pole -->
    <line x1="0" y1="34" x2="0" y2="46" stroke="url(#glow)" stroke-width="3" stroke-linecap="round"/>
    <!-- stand base -->
    <line x1="-14" y1="46" x2="14" y2="46" stroke="url(#glow)" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- label -->
  <text x="200" y="218" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#f1f5f9" letter-spacing="3">VOICELAB</text>
  <text x="200" y="234" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#818cf8" letter-spacing="1">AI Singing Coach · PWA + Android</text>
</svg>

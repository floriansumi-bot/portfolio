<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 563" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1206"/><stop offset="1" stop-color="#2a0f1e"/>
    </linearGradient>
    <linearGradient id="route" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f59e0b"/><stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.55"/><stop offset="1" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>
  <rect width="1000" height="563" fill="url(#bg)"/>
  <!-- subtle dot grid -->
  <g fill="#ffffff" opacity="0.05">
    <circle cx="120" cy="120" r="2"/><circle cx="260" cy="80" r="2"/><circle cx="420" cy="140" r="2"/><circle cx="600" cy="90" r="2"/><circle cx="780" cy="150" r="2"/><circle cx="900" cy="110" r="2"/>
    <circle cx="160" cy="430" r="2"/><circle cx="340" cy="470" r="2"/><circle cx="540" cy="440" r="2"/><circle cx="720" cy="480" r="2"/><circle cx="880" cy="440" r="2"/>
  </g>
  <!-- route -->
  <path d="M120 420 Q 250 250 360 330 T 600 250 Q 720 200 860 300" fill="none" stroke="url(#route)" stroke-width="5" stroke-linecap="round" stroke-dasharray="2 16" opacity="0.95"/>
  <!-- pins -->
  <g>
    <g transform="translate(120,420)"><circle r="46" fill="url(#glow)"/><path d="M0 -28 C 16 -28 26 -16 26 -2 C 26 14 0 34 0 34 C 0 34 -26 14 -26 -2 C -26 -16 -16 -28 0 -28 Z" fill="#f59e0b"/><circle cy="-4" r="9" fill="#1a1206"/></g>
    <g transform="translate(360,330)"><path d="M0 -22 C 13 -22 21 -13 21 -2 C 21 12 0 28 0 28 C 0 28 -21 12 -21 -2 C -21 -13 -13 -22 0 -22 Z" fill="#fb923c"/><circle cy="-3" r="7" fill="#1a1206"/></g>
    <g transform="translate(600,250)"><path d="M0 -22 C 13 -22 21 -13 21 -2 C 21 12 0 28 0 28 C 0 28 -21 12 -21 -2 C -21 -13 -13 -22 0 -22 Z" fill="#ec4899"/><circle cy="-3" r="7" fill="#1a1206"/></g>
    <g transform="translate(860,300)"><circle r="46" fill="url(#glow)"/><path d="M0 -28 C 16 -28 26 -16 26 -2 C 26 14 0 34 0 34 C 0 34 -26 14 -26 -2 C -26 -16 -16 -28 0 -28 Z" fill="#f472b6"/><circle cy="-4" r="9" fill="#2a0f1e"/></g>
  </g>
  <!-- clinking glasses -->
  <g transform="translate(470,120)" stroke="#fde68a" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.92">
    <path d="M-44 -28 L -30 36 L -8 36 L 6 -28 Z"/>
    <path d="M44 -28 L 30 36 L 8 36 L -6 -28 Z"/>
    <line x1="-25" y1="-6" x2="25" y2="-6"/>
  </g>
  <text x="500" y="515" text-anchor="middle" fill="#fcd9b6" font-size="26" font-weight="700" letter-spacing="3">BAR-CRAWL · ALL OF SWITZERLAND</text>
</svg>
